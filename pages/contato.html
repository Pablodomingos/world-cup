<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Copa do Mundo 2026</title>
    <link rel="stylesheet" href="../style/main.css">
    <link rel="stylesheet" href="../style/contato.css">
    <link rel="icon" type="image/png" href="../img/cbf.png">
</head>
<body data-base-path="../">
    <div data-component="header"></div>

    <div data-component="sidebar"></div>

    <main>
        <section class="contato" id="contato">
            <div class="contato__bg"></div>
            <div class="contato__container" data-animate="fade-up">
                <h1 class="contato__title">Entre em <span class="text-yellow">Contato</span></h1>
                <p class="contato__subtitle">Tem alguma sugestão, dúvida ou quer trocar uma ideia sobre futebol? Manda uma mensagem!</p>

                <div class="contato__wrapper">
                    <form class="contato__form" id="contact-form">
                        <div class="form__group">
                            <label for="name" class="form__label">Nome</label>
                            <input type="text" id="name" name="name" class="form__input" placeholder="Seu nome" required>
                        </div>
                        <div class="form__group">
                            <label for="email" class="form__label">E-mail</label>
                            <input type="email" id="email" name="email" class="form__input" placeholder="seu@email.com" required>
                        </div>
                        <div class="form__group">
                            <label for="message" class="form__label">Mensagem</label>
                            <textarea id="message" name="message" class="form__input form__textarea" placeholder="Escreva sua mensagem..." rows="5" required></textarea>
                        </div>
                        <button type="submit" class="form__btn">Enviar mensagem</button>
                        <p class="form__feedback" id="form-feedback"></p>
                    </form>

                    <div class="contato__social">
                        <h3 class="contato__social-title">Redes Sociais</h3>
                        <p class="contato__social-text">Acompanhe também pelo GitHub:</p>
                        <a href="https://github.com/Pablodomingos" target="_blank" rel="noopener noreferrer" class="contato__social-link">
                            <svg class="contato__social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-label="GitHub">
                                <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
                            </svg>
                            <span>github.com/Pablodomingos</span>
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div data-component="footer"></div>

    <div data-component="scroll-top"></div>

    <script src="../components/loader.js"></script>
    <script src="../script/main.js"></script>
    <script src="../script/contato.js"></script>
</body>
</html>
